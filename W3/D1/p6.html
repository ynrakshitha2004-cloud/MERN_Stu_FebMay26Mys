<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic typing,concatination,type conversion</title>

</head>

<body>
    <pre id="out"></pre>
    <button id="runBtn" class="px-3 py-1 text-white rounded mt-2 mb-2 bg-black">
        Run
    </button>
    <script>
        const out = document.getElementById("out");
        function print(...args) {
            //console 
            console.log(...args);
            out.textContent += args.join("") + "\n";
        }
        function clearOut() {
            out.textContent = "";
        }
        function run() {
            clearOut();
            //Dynamic typing,concatination,type conversion
            let value = "10";
            print("Value = ",value,"Typeof=",typeof value);
            value = 20;
            print("Value = ",value,"Typeof=",typeof value);

            print("'10'+5:","10"+5);
            print("'10'-5:","10"-5);//numeric convention

            print("'10'==10: ","10"==10);
            print("'10'===10: ","10"===10);

            //Data types
            const undefval = undefined ;
            const nullVal = null;
            print("undefval =",typeof undefval);
            print("nullVal =",nullVal,"typeof: ",typeof nullVal);
        }
        document.getElementById("runBtn").addEventListener
            ("click", run);
    </script>
</body>

</html>
