<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console usage & simple DOM manipulation</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <h1 class="text-2xl font-bold">My First Javascript </h1>
    <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-black text-white">
        Run
    </button>
    <!-- Preseve tag -->
    <pre id="out"></pre>
    <script>
        const out = document.getElementById("out");
        // function which accepts variable no. of ar
        function print(...args) {
            //Console
            console.log(...args);
            out.textContent += args.join("") + "\n";
        }
        function run() {
            print("Hello from Java Script!");
            print("2+3=", 2 + 3);
            document.body.style.background = "#ffffb3";
        }
        document.getElementById("runBtn").addEventListener("click", run);
        run()
    </script>
</body>
