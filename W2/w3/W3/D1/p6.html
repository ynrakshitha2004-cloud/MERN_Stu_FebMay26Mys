<!DOCTYPE html>

<body>
    <pre id="out"></pre>
    <button id="runBtn"
         class="px-3 py-1 rounded mt-2 mb-2 bg-black text-white">
         Run
    </button>
    <script>
        const out= document.getElementById("out");
         function print(...args){
            //Console
            console.log(...args);
            out.textContent+=args.join("")+"\n";
        }

        
        function clearOut(){
            out.textContent = "";
        }
        function run(){
            clearOut();
            //Dynamiv typing, conactenation, type conversion
            let value="10";
            print("value=", value, "Typeof=",typeof value);
            value=20;
            print("value=", value, "Typeof=",typeof value);

            print("'10+5: ", "10"+5);
            print("'10-5: ", "10"-5);//numeric conversion

            print("'10: ==10 ", "10"==10);
            rint("'10: ===10: ", "10"==10);

            //Datatypes
            const undefval =undefined;
            const nullVal =null;
            print("undefval = ",typeof undefval);
            print("nullVal = ",nullVal,"typeof: ", typeof nullVal);
          }
        document.getElementById("runBtn").addEventListener("click",run);
    </script>
</body>
