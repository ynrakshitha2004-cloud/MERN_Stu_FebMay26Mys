<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metric Snapshot Strip</title>
  
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 m-10">

  <!-- Metric Snapshot Strip -->
  <div class="bg-white p-6 m-6 rounded-2xl">

    <!-- Top Section: Metrics + Button -->
    <div class="flex justify-between items-start">

      <!-- Metrics Container -->
      <div class="flex space-x-12">

        <!-- Metric Block 1 -->
        <div>
          <p class="text-gray-600">Active Users</p>
          <p class="text-xl font-bold">12,450</p>
          <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full inline-flex items-center">
            Up
          </span>
        </div>

        <!-- Metric Block 2 -->
        <div>
          <p class="text-gray-600">Revenue</p>
          <p class="text-xl font-bold">$84,200</p>
          <span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full inline-flex items-center">
            Stable
          </span>
        </div>

        <!-- Metric Block 3 -->
        <div>
          <p class="text-gray-600 tracking-wide">Churn Rate</p>
          <p class="text-xl font-bold">2.4%</p>
          <span class="bg-red-100 text-red-700 px-3 py-1 rounded-full inline-flex items-center">
            Down
          </span>
        </div>

      </div>

      <!-- Primary Button -->
      <button class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg">
        Download Report
      </button>

    </div>

    <!-- Inline Alert -->
    <div class="bg-red-100 border-l-4 border-red-500 inline-flex items-center p-3 mt-6 rounded-lg">
      <p class="text-red-700">
        System alert: Revenue growth slowed by 3% compared to last week.
      </p>
    </div>

  </div>

</body>
</html>
